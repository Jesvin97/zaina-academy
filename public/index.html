<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zaina Academy - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#080c14;color:#e8e0d0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-box{width:100%;max-width:420px;padding:48px;background:#0d1220;border:1px solid rgba(212,175,95,0.12);border-radius:16px;margin:20px}
    .logo{text-align:center;margin-bottom:40px}
    .logo h1{font-family:'Cormorant Garamond',serif;font-size:2rem;color:#d4af5f}
    .logo p{color:#7a7060;font-size:0.875rem;letter-spacing:2px;text-transform:uppercase;margin-top:8px}
    .form-group{margin-bottom:1.5rem}
    .form-label{display:block;margin-bottom:0.5rem;font-size:0.875rem;font-weight:500;color:#b8b0a0;text-transform:uppercase;letter-spacing:0.5px}
    .form-input{width:100%;padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:1rem;color:#e8e0d0;background:#080c14;border:1px solid rgba(212,175,95,0.12);border-radius:8px;outline:none}
    .form-input:focus{border-color:#d4af5f;box-shadow:0 0 0 3px rgba(212,175,95,0.1)}
    .form-input::placeholder{color:#7a7060}
    .btn{width:100%;padding:16px;font-family:'DM Sans',sans-serif;font-size:0.875rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;border:none;border-radius:8px;cursor:pointer;background:linear-gradient(135deg,#d4af5f,#f0d080);color:#080c14}
    .btn:hover{box-shadow:0 0 30px rgba(212,175,95,0.3)}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .error{padding:12px;background:rgba(224,85,85,0.1);border:1px solid rgba(224,85,85,0.3);border-radius:8px;color:#e05555;font-size:0.875rem;margin-bottom:20px;display:none}
    .error.show{display:block}
    .toast-container{position:fixed;top:20px;right:20px;z-index:1100}
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <h1>✦ Zaina Academy</h1>
      <p>Student Portal</p>
    </div>
    <div id="loginError" class="error"></div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn" id="loginBtn">Sign In</button>
    </form>
  </div>
  <script>
    const token = localStorage.getItem('zaina_token');
    const user = JSON.parse(localStorage.getItem('zaina_user') || '{}');
    if (token && user.role) {
      window.location.href = user.role === 'admin' ? '/admin.html' : '/dashboard.html';
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      btn.disabled = true; btn.textContent = 'Signing in...'; err.classList.remove('show');
      try {
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('zaina_token', data.token);
        localStorage.setItem('zaina_user', JSON.stringify(data.user));
        window.location.href = data.user.role === 'admin' ? '/admin.html' : '/dashboard.html';
      } catch (error) {
        err.textContent = error.message; err.classList.add('show');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
